services:

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    env_file:
      - .env
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    restart: unless-stopped

  humancli-server:
    build:
      context: ..
      dockerfile: humancli-server/Dockerfile
    container_name: humancli-server
    ports:
      - "8081:8081"
    volumes:
      - ${HOST_ROOT}:/app/host
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - HOST_ROOT=${HOST_ROOT}
      - HOST_CWD=${HOST_CWD}
      - LOG_DIR=/app/logs
    env_file:
      - .env
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data: